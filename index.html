<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#000;
color:#fff;
padding:10px
}

.container{max-width:900px;margin:auto}

.header{
text-align:center;
margin:15px 0 25px 0;
}

.header h1{
font-size:42px;
color:#7c3aed;
letter-spacing:6px;
text-shadow:0 0 15px rgba(124,58,237,0.7);
}

.header p{
font-size:13px;
color:#aaa;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px
}

button{
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.hidden{display:none}

.nav{
display:flex;
gap:10px;
margin:15px 0
}

.nav button{flex:1}

.card{
background:#1a1a1a;
border-radius:18px;
overflow:hidden;
margin-bottom:10px;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.actions{
padding:10px;
display:flex;
flex-direction:column;
gap:5px;
}

#discordBtn{
position:fixed;
bottom:15px;
right:15px;
width:60px;
height:60px;
z-index:999;
}

#discordBtn img{
width:100%;
height:100%;
cursor:pointer;
filter:drop-shadow(0 0 10px #7c3aed);
}

#discordBtn img:hover{transform:scale(1.15)}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR</h1>
<p>Movsets exclusivos Kanja</p>
</div>

<!-- LOGIN -->
<div id="loginArea">

<h2>Login</h2>

<input id="loginUser" placeholder="Nome">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="toggleRegister()">Registrar</button>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="Novo nome">
<input id="regPass" placeholder="Nova senha">
<button onclick="register()">Criar Conta</button>
</div>

<p id="info"></p>
</div>

<!-- SITE -->
<div id="siteArea" class="hidden">

<div class="nav">
<button onclick="openPage('movPage')">Movsets</button>
<button onclick="openPage('texPage')">Malha e Textura</button>
</div>

<!-- MOVSETS -->
<div id="movPage">

<h2>Movsets</h2>

<div id="adminMov" class="hidden">
<input id="movFile" type="file">
<input id="movText" placeholder="Texto do movset">
<button onclick="addMov()">Adicionar</button>
</div>

<div id="movList"></div>

</div>

<!-- TEXTURA -->
<div id="texPage">

<h2>Malha e Textura</h2>

<div id="adminTex" class="hidden">

<input id="texFile" type="file">

<input id="texCabeca" placeholder="Cabeça">
<input id="texTorso" placeholder="Torso">
<input id="texMaoE" placeholder="Mão esquerda">
<input id="texMaoD" placeholder="Mão direita">
<input id="texPeE" placeholder="Pé esquerdo">
<input id="texPeD" placeholder="Pé direito">
<input id="texCompleto" placeholder="Completo">

<button onclick="addTex()">Adicionar</button>

</div>

<div id="texList"></div>

</div>

</div>
</div>

<!-- DISCORD -->
<a href="https://discord.gg/CYztbg3mQ6" target="_blank" id="discordBtn">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</a>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");

// ADMIN FIXO
if(!users["admin"]){
users["admin"] = {pass:"lunarkanja",role:"adm"};
localStorage.setItem("users", JSON.stringify(users));
}

let movs = JSON.parse(localStorage.getItem("movs") || "[]");
let texs = JSON.parse(localStorage.getItem("texs") || "[]");

let isAdmin = false;

function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("movs",JSON.stringify(movs));
localStorage.setItem("texs",JSON.stringify(texs));
}

function toggleRegister(){
document.getElementById("registerBox").classList.toggle("hidden");
}

function register(){
let u=document.getElementById("regUser").value;
let p=document.getElementById("regPass").value;

if(!u||!p){
document.getElementById("info").innerText="Preencha tudo";
return;
}

if(users[u]){
document.getElementById("info").innerText="Usuário já existe";
return;
}

users[u]={pass:p,role:"membro"};
save();
document.getElementById("info").innerText="Conta criada!";
}

function login(){
let u=document.getElementById("loginUser").value;
let p=document.getElementById("loginPass").value;

if(users[u] && users[u].pass===p){

document.getElementById("loginArea").classList.add("hidden");
document.getElementById("siteArea").classList.remove("hidden");

isAdmin = users[u].role==="adm";

if(isAdmin){
document.getElementById("adminMov").classList.remove("hidden");
document.getElementById("adminTex").classList.remove("hidden");
}

renderAll();
openPage("movPage");

}else{
document.getElementById("info").innerText="Login inválido";
}
}

function openPage(id){
document.getElementById("movPage").style.display="none";
document.getElementById("texPage").style.display="none";
document.getElementById(id).style.display="block";
}

function addMov(){

if(!isAdmin)return;

let file=document.getElementById("movFile").files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=e=>{
movs.push({
img:e.target.result,
text:document.getElementById("movText").value
});
save();
renderAll();
}

reader.readAsDataURL(file);
}

function addTex(){

if(!isAdmin)return;

let file=document.getElementById("texFile").files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=e=>{
texs.push({
img:e.target.result,
cabeca:document.getElementById("texCabeca").value,
torso:document.getElementById("texTorso").value,
maoE:document.getElementById("texMaoE").value,
maoD:document.getElementById("texMaoD").value,
peE:document.getElementById("texPeE").value,
peD:document.getElementById("texPeD").value,
completo:document.getElementById("texCompleto").value
});
save();
renderAll();
}

reader.readAsDataURL(file);
}

function renderAll(){

document.getElementById("movList").innerHTML="";
document.getElementById("texList").innerHTML="";

movs.forEach((m,i)=>{
document.getElementById("movList").innerHTML+=`
<div class="card">
<img src="${m.img}">
<div class="actions">
<p>${m.text}</p>
</div>
</div>`;
});

texs.forEach((t,i)=>{
document.getElementById("texList").innerHTML+=`
<div class="card">
<img src="${t.img}">
<div class="actions">
<p>Cabeça: ${t.cabeca||"-"}</p>
<p>Torso: ${t.torso||"-"}</p>
<p>Mão E: ${t.maoE||"-"}</p>
<p>Mão D: ${t.maoD||"-"}</p>
<p>Pé E: ${t.peE||"-"}</p>
<p>Pé D: ${t.peD||"-"}</p>
<p>Completo: ${t.completo||"-"}</p>
</div>
</div>`;
});
}
</script>

</body>
</html>
