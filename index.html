<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#000;
color:#fff;
padding:10px
}

.container{max-width:900px;margin:auto}

.header{
text-align:center;
margin:15px 0 25px 0;
}

.header h1{
font-size:42px;
color:#7c3aed;
letter-spacing:6px;
text-shadow:0 0 15px rgba(124,58,237,0.7);
}

.header p{
font-size:13px;
color:#aaa;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px
}

button{
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.hidden{display:none}

.nav{
display:flex;
gap:10px;
margin:15px 0
}

.nav button{flex:1}

/* CARD */
.card{
background:#1a1a1a;
border-radius:18px;
margin-bottom:12px;
border:1px solid #333;
overflow:visible;
}

.card img{
width:100%;
height:auto;
display:block;
background:#000;
object-fit:contain;
}

.title{
padding:10px;
font-size:18px;
font-weight:bold;
color:#7c3aed;
}

.sub{
padding:0 10px 10px;
font-size:13px;
color:#aaa;
}

.actions{
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{flex:1}

.search{
margin:10px 0 15px 0;
}

#discordBtn{
position:fixed;
bottom:15px;
right:15px;
width:60px;
height:60px;
z-index:999;
}

#discordBtn img{
width:100%;
height:100%;
cursor:pointer;
transition:0.2s;
filter:drop-shadow(0 0 10px #7c3aed);
}

#discordBtn img:hover{
transform:scale(1.15);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR</h1>
<p>Movsets exclusivos Kanja</p>
</div>

<!-- MOVSETS -->
<div id="movPage">
<h1>Movsets</h1>

<input id="movName" placeholder="Nome">
<input id="movText" placeholder="Texto">
<input id="movFile" type="file">
<button onclick="addMov()">Adicionar Movset</button>

<div id="movList"></div>
</div>

<!-- MAPAS -->
<div id="mapPage">
<h1>Mapas</h1>

<input id="mapName" placeholder="Nome">
<input id="mapFile" type="file">
<button onclick="addMap()">Adicionar Mapa</button>

<div id="mapList"></div>
</div>

<!-- TEXTURA -->
<div id="texPage">
<h1>Textura / Malha</h1>

<input id="texName" placeholder="Nome">
<input id="texFile" type="file">
<button onclick="addTex()">Adicionar Textura</button>

<div id="texList"></div>
</div>

</div>

<a id="discordBtn" href="https://discord.gg/CYztbg3mQ6" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</a>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_ID",
  appId: "SEU_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =======================
   ADD MOVSET
======================= */
function addMov(){
let file = movFile.files[0];
if(!file) return;

let r = new FileReader();
r.onload = e=>{
db.collection("movs").add({
name: movName.value || "Sem nome",
text: movText.value || "",
img: e.target.result
});
}
r.readAsDataURL(file);
}

/* =======================
   ADD MAPA
======================= */
function addMap(){
let file = mapFile.files[0];
if(!file) return;

let r = new FileReader();
r.onload = e=>{
db.collection("maps").add({
name: mapName.value || "Sem nome",
img: e.target.result
});
}
r.readAsDataURL(file);
}

/* =======================
   ADD TEXTURA
======================= */
function addTex(){
let file = texFile.files[0];
if(!file) return;

let r = new FileReader();
r.onload = e=>{
db.collection("texs").add({
name: texName.value || "Sem nome",
img: e.target.result
});
}
r.readAsDataURL(file);
}

/* =======================
   CARREGAR EM TEMPO REAL
======================= */
db.collection("movs").onSnapshot(s=>{
movList.innerHTML="";
s.forEach(d=>{
let m=d.data();

movList.innerHTML += `
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
<div class="sub">${m.text}</div>
</div>`;
});
});

db.collection("maps").onSnapshot(s=>{
mapList.innerHTML="";
s.forEach(d=>{
let m=d.data();

mapList.innerHTML += `
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
</div>`;
});
});

db.collection("texs").onSnapshot(s=>{
texList.innerHTML="";
s.forEach(d=>{
let m=d.data();

texList.innerHTML += `
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
</div>`;
});
});
</script>

</body>
</html>
