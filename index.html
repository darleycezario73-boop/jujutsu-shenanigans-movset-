<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Online</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#000;
color:#fff;
padding:10px;
}

.container{max-width:900px;margin:auto}

.header{text-align:center;margin:20px 0}
.header h1{color:#7c3aed;font-size:40px;text-shadow:0 0 10px #7c3aed}

input,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
}

button{background:#7c3aed;color:#fff;cursor:pointer}

.card{
background:#1a1a1a;
border:1px solid #333;
border-radius:15px;
margin:10px 0;
overflow:hidden;
}

.card img{
width:100%;
height:auto;
display:block;
background:#000;
}

.title{
padding:10px;
color:#7c3aed;
font-weight:bold;
}

.actions{padding:10px}

.hidden{display:none}

.nav{display:flex;gap:10px;margin:10px 0}
.nav button{flex:1}

#discordBtn{
position:fixed;
bottom:15px;
right:15px;
width:60px;
height:60px;
}
#discordBtn img{width:100%}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR ONLINE</h1>
<p>Todos veem os mesmos dados</p>
</div>

<!-- MOVSETS -->
<h2>Movsets</h2>
<input id="movName" placeholder="Nome">
<input id="movText" placeholder="Texto">
<input id="movFile" type="file">
<button onclick="addMov()">Adicionar Movset</button>

<div id="movList"></div>

<!-- MAPAS -->
<h2>Mapas</h2>
<input id="mapName" placeholder="Nome">
<input id="mapFile" type="file">
<button onclick="addMap()">Adicionar Mapa</button>

<div id="mapList"></div>

<!-- TEXTURA -->
<h2>Textura / Malha</h2>
<input id="texName" placeholder="Nome">
<input id="texFile" type="file">
<button onclick="addTex()">Adicionar Textura</button>

<div id="texList"></div>

</div>

<a id="discordBtn" href="https://discord.gg/CYztbg3mQ6" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</a>

<!-- 🔥 FIREBASE (ONLINE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_ID",
  appId: "SEU_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addMov(){
let file = movFile.files[0];
if(!file) return;

let r = new FileReader();
r.onload = e=>{
db.collection("movs").add({
name:movName.value,
text:movText.value,
img:e.target.result
});
}
r.readAsDataURL(file);
}

function addMap(){
let file = mapFile.files[0];
if(!file) return;

let r = new FileReader();
r.onload = e=>{
db.collection("maps").add({
name:mapName.value,
img:e.target.result
});
}
r.readAsDataURL(file);
}

function addTex(){
let file = texFile.files[0];
if(!file) return;

let r = new FileReader();
r.onload = e=>{
db.collection("texs").add({
name:texName.value,
img:e.target.result
});
}
r.readAsDataURL(file);
}

/* 🔥 CARREGAR EM TEMPO REAL */
db.collection("movs").onSnapshot(s=>{
movList.innerHTML="";
s.forEach(d=>{
let m=d.data();
movList.innerHTML+=`
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
<div>${m.text||""}</div>
</div>`;
});
});

db.collection("maps").onSnapshot(s=>{
mapList.innerHTML="";
s.forEach(d=>{
let m=d.data();
mapList.innerHTML+=`
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
</div>`;
});
});

db.collection("texs").onSnapshot(s=>{
texList.innerHTML="";
s.forEach(d=>{
let m=d.data();
texList.innerHTML+=`
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
</div>`;
});
});
</script>

</body>
</html>
