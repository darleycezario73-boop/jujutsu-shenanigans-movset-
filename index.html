<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#000;
color:#fff;
padding:10px
}

.container{max-width:900px;margin:auto}

.header{
text-align:center;
margin:15px 0 25px 0;
}

.header h1{
font-size:42px;
color:#7c3aed;
letter-spacing:6px;
text-shadow:0 0 15px rgba(124,58,237,0.7);
}

.header p{
font-size:13px;
color:#aaa;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px
}

button{
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.hidden{display:none}

.nav{
display:flex;
gap:10px;
margin:15px 0
}

.nav button{flex:1}

.card{
background:#1a1a1a;
border-radius:18px;
overflow:hidden;
margin-bottom:10px;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.actions{
padding:10px;
display:flex;
gap:10px;
}

.actions button{flex:1}

#movPage,#texPage{
display:none;
}

#discordBtn{
position:fixed;
bottom:15px;
right:15px;
width:60px;
height:60px;
}

#discordBtn img{
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR</h1>
<p>Movsets exclusivos</p>
</div>

<div id="loginArea">
<h2>Login</h2>

<input id="loginUser" placeholder="Nome">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<button onclick="registerBox.classList.toggle('hidden')">Registrar</button>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="Novo nome">
<input id="regPass" placeholder="Nova senha">
<button onclick="register()">Criar Conta</button>
</div>

<p id="info"></p>
</div>

<div id="siteArea" class="hidden">

<div class="nav">
<button onclick="openPage('movPage')">Movsets</button>
<button onclick="openPage('texPage')">Texturas</button>
</div>

<div id="movPage">
<h2>Movsets</h2>

<div id="adminMov" class="hidden">
<input id="movFile" type="file">
<input id="movText" placeholder="Texto">
<button onclick="addMov()">Adicionar</button>
</div>

<div id="movList"></div>
</div>

<div id="texPage">
<h2>Texturas</h2>

<div id="adminTex" class="hidden">
<input id="texFile" type="file">
<button onclick="addTex()">Adicionar</button>
</div>

<div id="texList"></div>
</div>

</div>
</div>

<a href="https://discord.gg/CYztbg3mQ6" target="_blank" id="discordBtn">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</a>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");
users["admin"] = {pass:"1234",role:"adm"};

let movs = JSON.parse(localStorage.getItem("movs") || "[]");
let texs = JSON.parse(localStorage.getItem("texs") || "[]");

let isAdmin = false;

function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("movs",JSON.stringify(movs));
localStorage.setItem("texs",JSON.stringify(texs));
}

function register(){
let u = regUser.value;
let p = regPass.value;

if(users[u]){
info.innerText="Usuário já existe";
return;
}

users[u]={pass:p,role:"membro"};
save();
loginUser.value=u;
loginPass.value=p;
login();
}

function login(){
let u=loginUser.value;
let p=loginPass.value;

if(users[u] && users[u].pass==p){

loginArea.classList.add("hidden");
siteArea.classList.remove("hidden");

isAdmin = users[u].role=="adm";

if(isAdmin){
adminMov.classList.remove("hidden");
adminTex.classList.remove("hidden");
}

renderAll();

}else{
info.innerText="Login inválido";
}
}

function openPage(id){
movPage.style.display="none";
texPage.style.display="none";
document.getElementById(id).style.display="block";
}

function renderAll(){
movList.innerHTML="";
texList.innerHTML="";

movs.forEach((m,i)=>{
movList.innerHTML+=`
<div class="card">
<img src="${m.img}">
<div class="actions">
<button onclick="copyText('${m.text}',this)">Copiar</button>
${isAdmin?`<button onclick="deleteMov(${i})">Excluir</button>`:""}
</div>
</div>`;
});

texs.forEach((t,i)=>{
texList.innerHTML+=`
<div class="card">
<img src="${t.img}">
${isAdmin?`<button onclick="deleteTex(${i})">Excluir</button>`:""}
</div>`;
});
}

function copyText(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="Copiado!";
setTimeout(()=>btn.innerText="Copiar",1500);
}

function deleteMov(i){
if(!isAdmin)return;
movs.splice(i,1);
save();
renderAll();
}

function deleteTex(i){
if(!isAdmin)return;
texs.splice(i,1);
save();
renderAll();
}

function addMov(){
if(!isAdmin)return;
let file=movFile.files[0];
let reader=new FileReader();
reader.onload=e=>{
movs.push({img:e.target.result,text:movText.value});
save();renderAll();
}
reader.readAsDataURL(file);
}

function addTex(){
if(!isAdmin)return;
let file=texFile.files[0];
let reader=new FileReader();
reader.onload=e=>{
texs.push({img:e.target.result});
save();renderAll();
}
reader.readAsDataURL(file);
}
</script>

</body>
</html>
