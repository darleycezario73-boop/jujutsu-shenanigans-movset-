<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#000;
color:#fff;
padding:10px
}

.container{max-width:900px;margin:auto}

.header{
text-align:center;
margin:15px 0 25px 0;
}

.header h1{
font-size:42px;
color:#7c3aed;
letter-spacing:6px;
text-shadow:0 0 15px rgba(124,58,237,0.7);
}

.header p{
font-size:13px;
color:#aaa;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px
}

button{
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.hidden{display:none}

.nav{
display:flex;
gap:10px;
margin:15px 0
}

.nav button{flex:1}

/* 🔥 CARD CORRIGIDO */
.card{
background:#1a1a1a;
border-radius:18px;
margin-bottom:12px;
border:1px solid #333;
overflow:visible;
}

/* 🔥 IMAGEM SEM CORTE */
.card img{
width:100%;
height:auto;
display:block;
background:#000;
object-fit:contain;
}

.title{
padding:10px;
font-size:18px;
font-weight:bold;
color:#7c3aed;
}

.sub{
padding:0 10px 10px;
font-size:13px;
color:#aaa;
}

.actions{
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{flex:1}

.search{
margin:10px 0 15px 0;
}

#discordBtn{
position:fixed;
bottom:15px;
right:15px;
width:60px;
height:60px;
z-index:999;
}

#discordBtn img{
width:100%;
height:100%;
cursor:pointer;
transition:0.2s;
filter:drop-shadow(0 0 10px #7c3aed);
}

#discordBtn img:hover{
transform:scale(1.15);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR</h1>
<p>Movsets exclusivos Kanja</p>
</div>

<div id="loginArea">
<h2>Login</h2>

<input id="loginUser" placeholder="Nome">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<button onclick="toggleRegister()">Registrar</button>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="Novo nome">
<input id="regPass" placeholder="Nova senha">
<button onclick="register()">Criar Conta</button>
</div>

<p id="info"></p>
</div>

<div id="siteArea" class="hidden">

<div class="nav">
<button onclick="openPage('movPage')">Movsets</button>
<button onclick="openPage('mapPage')">Mapas</button>
<button onclick="openPage('texPage')">Textura / Malha</button>
</div>

<!-- MOVSETS -->
<div id="movPage">

<h1>Movsets</h1>
<input class="search" id="searchMov" placeholder="Pesquisar movset..." onkeyup="renderAll()">

<div id="adminMov" class="hidden">
<input id="movName" placeholder="Nome do movset">
<input id="movFile" type="file">
<input id="movText" placeholder="Texto">
<button onclick="addMov()">Adicionar</button>
</div>

<div id="movList"></div>
</div>

<!-- MAPAS -->
<div id="mapPage" style="display:none">

<h1>Mapas</h1>
<input class="search" id="searchMap" placeholder="Pesquisar mapa..." onkeyup="renderAll()">

<div id="adminMap" class="hidden">
<input id="mapName" placeholder="Nome do mapa">
<input id="mapFile" type="file">
<button onclick="addMap()">Adicionar</button>
</div>

<div id="mapList"></div>
</div>

<!-- TEXTURA -->
<div id="texPage" style="display:none">

<h1>Textura / Malha</h1>
<input class="search" id="searchTex" placeholder="Pesquisar textura ou malha..." onkeyup="renderAll()">

<div id="adminTex" class="hidden">
<input id="texName" placeholder="Nome da textura/malha">
<input id="texFile" type="file">
<button onclick="addTex()">Adicionar</button>
</div>

<div id="texList"></div>
</div>

</div>

<a href="https://discord.gg/CYztbg3mQ6" target="_blank" id="discordBtn">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</a>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");

if(!users["admin"]){
users["admin"]={pass:"lunarkanja",role:"adm"};
localStorage.setItem("users",JSON.stringify(users));
}

let movs = JSON.parse(localStorage.getItem("movs") || "[]");
let maps = JSON.parse(localStorage.getItem("maps") || "[]");
let texs = JSON.parse(localStorage.getItem("texs") || "[]");

let isAdmin = false;

function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("movs",JSON.stringify(movs));
localStorage.setItem("maps",JSON.stringify(maps));
localStorage.setItem("texs",JSON.stringify(texs));
}

function toggleRegister(){
registerBox.classList.toggle("hidden");
}

function register(){
let u=regUser.value.trim();
let p=regPass.value.trim();

if(!u || !p){
info.innerText="Preencha tudo";
return;
}

if(users[u]){
info.innerText="Usuário já existe";
return;
}

users[u]={pass:p,role:"membro"};
save();
info.innerText="Conta criada!";
}

function login(){
let u=loginUser.value.trim();
let p=loginPass.value.trim();

if(users[u] && users[u].pass===p){

loginArea.classList.add("hidden");
siteArea.classList.remove("hidden");

isAdmin = users[u].role==="adm";

if(isAdmin){
adminMov.classList.remove("hidden");
adminMap.classList.remove("hidden");
adminTex.classList.remove("hidden");
}

openPage("movPage");
renderAll();

}else{
info.innerText="Login inválido";
}
}

function openPage(id){
movPage.style.display="none";
mapPage.style.display="none";
texPage.style.display="none";
document.getElementById(id).style.display="block";
}

function renderAll(){

movList.innerHTML="";
mapList.innerHTML="";
texList.innerHTML="";

let sm = searchMov.value.toLowerCase();
let sma = searchMap.value.toLowerCase();
let st = searchTex.value.toLowerCase();

movs.forEach((m,i)=>{
if(!m.name.toLowerCase().includes(sm)) return;

movList.innerHTML += `
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
<div class="sub">${m.text}</div>
<div class="actions">
<button onclick="copyText('${m.text}',this)">Copiar</button>
${isAdmin?`<button onclick="deleteMov(${i})">Excluir</button>`:""}
</div>
</div>`;
});

maps.forEach((m,i)=>{
if(!m.name.toLowerCase().includes(sma)) return;

mapList.innerHTML += `
<div class="card">
<div class="title">${m.name}</div>
<img src="${m.img}">
<div class="actions">
${isAdmin?`<button onclick="deleteMap(${i})">Excluir</button>`:""}
</div>
</div>`;
});

texs.forEach((t,i)=>{
if(!t.name.toLowerCase().includes(st)) return;

texList.innerHTML += `
<div class="card">
<div class="title">${t.name}</div>
<img src="${t.img}">
<div class="actions">
${isAdmin?`<button onclick="deleteTex(${i})">Excluir</button>`:""}
</div>
</div>`;
});
}

function copyText(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="Copiado!";
setTimeout(()=>btn.innerText="Copiar",1500);
}

function deleteMov(i){ movs.splice(i,1); save(); renderAll(); }
function deleteMap(i){ maps.splice(i,1); save(); renderAll(); }
function deleteTex(i){ texs.splice(i,1); save(); renderAll(); }

function addMov(){
let file=movFile.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=e=>{
movs.push({
name:movName.value || "Sem nome",
img:e.target.result,
text:movText.value || ""
});
save();
renderAll();
}
reader.readAsDataURL(file);
}

function addMap(){
let file=mapFile.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=e=>{
maps.push({
name:mapName.value || "Sem nome",
img:e.target.result
});
save();
renderAll();
}
reader.readAsDataURL(file);
}

function addTex(){
let file=texFile.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=e=>{
texs.push({
name:texName.value || "Sem nome",
img:e.target.result
});
save();
renderAll();
}
reader.readAsDataURL(file);
}
</script>

</body>
</html>
