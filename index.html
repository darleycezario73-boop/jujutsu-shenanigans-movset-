<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#000;
color:#fff;
padding:10px;
}

.container{max-width:900px;margin:auto}

.header{text-align:center;margin:20px 0}

.header h1{
font-size:40px;
color:#7c3aed;
text-shadow:0 0 10px #7c3aed;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.hidden{display:none}

.nav{display:flex;gap:10px;margin:10px 0}
.nav button{flex:1}

.card{
background:#1a1a1a;
margin:10px 0;
border-radius:10px;
overflow:hidden;
}

.card img{width:100%;height:200px;object-fit:cover}

.actions{padding:10px}

#discordBtn{
position:fixed;
bottom:15px;
right:15px;
width:60px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR</h1>
<p>Movsets e Texturas</p>
</div>

<!-- LOGIN -->
<div id="loginArea">
<h2>Login</h2>
<input id="loginUser" placeholder="Email">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>
<p id="info"></p>
</div>

<!-- SITE -->
<div id="siteArea" class="hidden">

<div class="nav">
<button onclick="show('mov')">Movsets</button>
<button onclick="show('tex')">Texturas</button>
</div>

<!-- MOV -->
<div id="mov" class="page">

<input id="movFile" type="file">
<input id="movText" placeholder="Texto movset">
<button onclick="addMov()">Adicionar Movset</button>

<div id="movList"></div>
</div>

<!-- TEX -->
<div id="tex" class="page hidden">

<input id="texFile" type="file">

<input id="texCabeca" placeholder="Cabeça">
<input id="texTorso" placeholder="Torso">
<input id="texMaoE" placeholder="Mão esquerda">
<input id="texMaoD" placeholder="Mão direita">
<input id="texPeE" placeholder="Pé esquerdo">
<input id="texPeD" placeholder="Pé direito">
<input id="texCompleto" placeholder="Completo">

<button onclick="addTex()">Adicionar Textura</button>

<div id="texList"></div>
</div>

</div>
</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";


// 🔥 COLE SUA CONFIG DO FIREBASE AQUI
const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH",
projectId: "SEU_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window.auth = auth;
window.db = db;
window.storage = storage;

window.firebase = {
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
collection,
addDoc,
getDocs,
ref,
uploadBytes,
getDownloadURL
};

// ================= LOGIN =================

window.login = async function(){

let email = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

try{

await firebase.signInWithEmailAndPassword(auth,email,pass);

document.getElementById("loginArea").classList.add("hidden");
document.getElementById("siteArea").classList.remove("hidden");

loadMov();
loadTex();

}catch{
document.getElementById("info").innerText="Login inválido";
}

}

// ================= REGISTER =================

window.register = async function(){

let email = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

try{
await firebase.createUserWithEmailAndPassword(auth,email,pass);
document.getElementById("info").innerText="Conta criada!";
}catch{
document.getElementById("info").innerText="Erro";
}

}

// ================= NAV =================

window.show = function(p){

document.getElementById("mov").classList.add("hidden");
document.getElementById("tex").classList.add("hidden");

document.getElementById(p).classList.remove("hidden");
}

// ================= MOV =================

window.addMov = async function(){

let file=document.getElementById("movFile").files[0];
if(!file)return;

let r=firebase.ref(storage,"mov/"+file.name);

await firebase.uploadBytes(r,file);

let url=await firebase.getDownloadURL(r);

await firebase.addDoc(collection(db,"mov"),{
img:url,
text:document.getElementById("movText").value
});

loadMov();
}

window.loadMov = async function(){

let snap=await firebase.getDocs(collection(db,"mov"));

document.getElementById("movList").innerHTML="";

snap.forEach(d=>{
let m=d.data();

document.getElementById("movList").innerHTML+=`
<div class="card">
<img src="${m.img}">
<div class="actions">${m.text}</div>
</div>`;
});
}

// ================= TEX =================

window.addTex = async function(){

let file=document.getElementById("texFile").files[0];
if(!file)return;

let r=firebase.ref(storage,"tex/"+file.name);

await firebase.uploadBytes(r,file);

let url=await firebase.getDownloadURL(r);

await firebase.addDoc(collection(db,"tex"),{
img:url,
cabeca:texCabeca.value,
torso:texTorso.value,
maoE:texMaoE.value,
maoD:texMaoD.value,
peE:texPeE.value,
peD:texPeD.value,
completo:texCompleto.value
});

loadTex();
}

window.loadTex = async function(){

let snap=await firebase.getDocs(collection(db,"tex"));

document.getElementById("texList").innerHTML="";

snap.forEach(d=>{
let t=d.data();

document.getElementById("texList").innerHTML+=`
<div class="card">
<img src="${t.img}">
<div class="actions">
<p>Cabeça: ${t.cabeca||"-"}</p>
<p>Torso: ${t.torso||"-"}</p>
<p>Mão E: ${t.maoE||"-"}</p>
<p>Mão D: ${t.maoD||"-"}</p>
<p>Pé E: ${t.peE||"-"}</p>
<p>Pé D: ${t.peD||"-"}</p>
<p>Completo: ${t.completo||"-"}</p>
</div>
</div>`;
});
}

</script>

</body>
</html>
