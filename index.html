<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#000;
color:#fff;
padding:10px
}

.container{max-width:900px;margin:auto}

.header{
text-align:center;
margin:15px 0 25px 0;
}

.header h1{
font-size:42px;
color:#7c3aed;
letter-spacing:6px;
text-shadow:0 0 15px rgba(124,58,237,0.7);
}

.header p{font-size:13px;color:#aaa;}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px
}

button{
background:#7c3aed;
color:#fff;
cursor:pointer;
}

.hidden{display:none}

.nav{
display:flex;
gap:10px;
margin:15px 0
}

.nav button{flex:1}

.search{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:2px solid #7c3aed;
background:#111;
color:#fff;
}

.card{
background:#1a1a1a;
border-radius:18px;
margin-bottom:10px;
overflow:hidden;
}

.card img{
width:100%;
height:auto;
display:block;
}

.actions{
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{flex:1}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>LUNAR</h1>
<p>Movsets exclusivos Kanja</p>
</div>

<!-- LOGIN -->

<div id="loginArea">
<h2>Login</h2>
<input id="loginUser" placeholder="Nome">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<button onclick="toggleRegister()">Registrar</button>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="Novo nome">
<input id="regPass" placeholder="Nova senha">
<button onclick="register()">Criar Conta</button>
</div>

<p id="info"></p>
</div>

<!-- SITE -->

<div id="siteArea" class="hidden">

<!-- 🔍 SEARCH SEPARADA -->

<input id="search" class="search" placeholder="🔍 Buscar pelo nome..." oninput="renderAll()">

<div class="nav">
<button onclick="openPage('movPage')">Movsets</button>
<button onclick="openPage('texPage')">Texturas</button>
<button onclick="openPage('mapPage')">Mapas</button>
</div>

<!-- MOVSETS -->

<div id="movPage">
<h1>Movsets</h1>

<div id="adminMov" class="hidden">
<input id="movFile" type="file">
<input id="movText" placeholder="Texto">
<button onclick="addMov()">Adicionar</button>
</div>

<div id="movList"></div>
</div>

<!-- TEXTURAS -->

<div id="texPage" style="display:none;">
<h1>Texturas</h1>

<div id="adminTex" class="hidden">
<input id="texFile" type="file">
<input id="texText" placeholder="Texto">
<button onclick="addTex()">Adicionar</button>
</div>

<div id="texList"></div>
</div>

<!-- MAPAS -->

<div id="mapPage" style="display:none;">
<h1>Mapas</h1>

<div id="adminMap" class="hidden">
<input id="mapFile" type="file">
<button onclick="addMap()">Adicionar</button>
</div>

<div id="mapList"></div>
</div>

</div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");

if(!users["admin"]){
users["admin"]={pass:"lunarkanja",role:"adm"};
localStorage.setItem("users",JSON.stringify(users));
}

let movs = JSON.parse(localStorage.getItem("movs") || "[]");
let texs = JSON.parse(localStorage.getItem("texs") || "[]");
let maps = JSON.parse(localStorage.getItem("maps") || "[]");

let isAdmin=false;

function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("movs",JSON.stringify(movs));
localStorage.setItem("texs",JSON.stringify(texs));
localStorage.setItem("maps",JSON.stringify(maps));
}

function login(){
let u=loginUser.value;
let p=loginPass.value;

if(users[u] && users[u].pass===p){
loginArea.classList.add("hidden");
siteArea.classList.remove("hidden");

isAdmin = users[u].role==="adm";

if(isAdmin){
adminMov.classList.remove("hidden");
adminTex.classList.remove("hidden");
adminMap.classList.remove("hidden");
}

renderAll();
}else{
info.innerText="Login inválido";
}
}

function toggleRegister(){
registerBox.classList.toggle("hidden");
}

function register(){
users[regUser.value]={pass:regPass.value,role:"membro"};
save();
info.innerText="Conta criada!";
}

function openPage(id){
movPage.style.display="none";
texPage.style.display="none";
mapPage.style.display="none";
document.getElementById(id).style.display="block";
}

/* 🔍 SEARCH */
function renderAll(){

let s = search.value.toLowerCase();

movList.innerHTML="";
texList.innerHTML="";
mapList.innerHTML="";

movs.filter(m=>m.text.toLowerCase().includes(s)).forEach((m,i)=>{
movList.innerHTML+=`
<div class="card">
<img src="${m.img}">
<div class="actions">
<button onclick="copyText('${m.text}',this)">Copiar</button>
</div>
</div>`;
});

texs.filter(t=>t.text.toLowerCase().includes(s)).forEach((t,i)=>{
texList.innerHTML+=`
<div class="card">
<img src="${t.img}">
<div class="actions">
<button onclick="copyText('${t.text}',this)">Copiar</button>
</div>
</div>`;
});

maps.forEach((m,i)=>{
mapList.innerHTML+=`
<div class="card">
<img src="${m.img}">
</div>`;
});
}

/* 🔥 CORRIGIDO (AQUI ESTAVA O ERRO) */
function addMov(){
if(!isAdmin)return;

let file=document.getElementById("movFile").files[0];
if(!file) return;

let r=new FileReader();
r.onload=e=>{
movs.push({img:e.target.result,text:movText.value});
save();
renderAll();
}
r.readAsDataURL(file);
}

function addTex(){
if(!isAdmin)return;

let file=document.getElementById("texFile").files[0];
if(!file) return;

let r=new FileReader();
r.onload=e=>{
texs.push({img:e.target.result,text:texText.value});
save();
renderAll();
}
r.readAsDataURL(file);
}

function addMap(){
if(!isAdmin)return;

let file=document.getElementById("mapFile").files[0];
if(!file) return;

let r=new FileReader();
r.onload=e=>{
maps.push({img:e.target.result});
save();
renderAll();
}
r.readAsDataURL(file);
}

function copyText(t,b){
navigator.clipboard.writeText(t);
b.innerText="Copiado!";
setTimeout(()=>b.innerText="Copiar",1500);
}
</script>

</body>
</html>
